# Home Assistant MQTT Sensor Configuration — Polling Mode
#
# Use these templates when USE_SSE is set to false.
# Polling mode publishes data from the /ivp/meters/readings endpoint (FW 7/8)
# or from the /ivp/livedata/status endpoint (FW 8 with batteries).
#
# ── Meters/Readings format (no batteries) ──────────────────────
# The JSON is an array of meter objects:
#   [ { "activePower": ..., "voltage": ..., "current": ..., ... }, ... ]
# Index 0 = production, Index 1 = consumption (net or total, depending on config).
#
# ── Livedata format (with batteries) ───────────────────────────
# The JSON is an object with meters and battery state:
#   { "meters": { "pv": { "agg_p_mw": ... }, "grid": { ... }, "storage": { ... } }, ... }
# Power values are in milliwatts — divide by 1000 to get watts.
#
# Adjust state_topic to match your MQTT_TOPIC configuration.

# =================================================================
# Option A: FW 7/8 without batteries (/ivp/meters/readings)
# =================================================================
mqtt:
  sensor:
    - name: envoy production
      state_topic: "/envoy/json"
      value_template: '{{ value_json[0]["activePower"] | round(0) | int(0) }}'
      unique_id: envoy_production
      qos: 0
      unit_of_measurement: "W"
      state_class: measurement
      device_class: power

    - name: envoy consumption
      state_topic: "/envoy/json"
      value_template: '{{ value_json[1]["activePower"] | round(0) | int(0) }}'
      unique_id: envoy_consumption
      qos: 0
      unit_of_measurement: "W"
      state_class: measurement
      device_class: power

    - name: envoy voltage
      state_topic: "/envoy/json"
      value_template: '{{ value_json[1]["voltage"] | round(0) | int(0) }}'
      unique_id: envoy_voltage
      qos: 0
      unit_of_measurement: "V"
      state_class: measurement
      device_class: voltage

    - name: envoy current
      state_topic: "/envoy/json"
      value_template: '{{ value_json[1]["current"] | round(2) }}'
      unique_id: envoy_current
      qos: 0
      unit_of_measurement: "A"
      state_class: measurement
      device_class: current

    - name: envoy power factor
      state_topic: "/envoy/json"
      value_template: '{{ value_json[1]["pwrFactor"] | round(2) }}'
      unique_id: envoy_power_factor
      qos: 0
      unit_of_measurement: "%"
      state_class: measurement
      device_class: power_factor

