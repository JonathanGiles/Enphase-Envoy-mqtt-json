# Home Assistant MQTT Sensor Configuration — SSE Mode
#
# Use these templates when USE_SSE is enabled (the default).
# SSE mode publishes data from the /stream/meter endpoint with this structure:
#
#   {
#     "production":        { "ph-a": { "p": ..., "v": ..., "i": ..., ... } },
#     "net-consumption":   { "ph-a": { "p": ..., "v": ..., "i": ..., ... } },
#     "total-consumption": { "ph-a": { "p": ..., "v": ..., "i": ..., ... } }
#   }
#
# Each phase object contains: p (watts), q (reactive VA), s (apparent VA),
# v (volts), i (amps), pf (power factor), f (frequency Hz).
#
# For three-phase systems, add ph-b and ph-c sensors following the same pattern.
#
# Adjust state_topic to match your MQTT_TOPIC configuration.

mqtt:
  sensor:
    # ── Production ──────────────────────────────────────────────
    - name: envoy production
      state_topic: "/envoy/json"
      value_template: >-
        {% if is_state("sun.sun", "below_horizon") %}0
        {% else %}{{ value_json["production"]["ph-a"]["p"] | round(0) | int(0) }}
        {% endif %}
      unique_id: envoy_production
      qos: 0
      unit_of_measurement: "W"
      state_class: measurement
      device_class: power

    - name: envoy production voltage
      state_topic: "/envoy/json"
      value_template: '{{ value_json["production"]["ph-a"]["v"] | round(1) }}'
      unique_id: envoy_production_voltage
      qos: 0
      unit_of_measurement: "V"
      state_class: measurement
      device_class: voltage

    - name: envoy production current
      state_topic: "/envoy/json"
      value_template: '{{ value_json["production"]["ph-a"]["i"] | round(2) }}'
      unique_id: envoy_production_current
      qos: 0
      unit_of_measurement: "A"
      state_class: measurement
      device_class: current

    - name: envoy production power factor
      state_topic: "/envoy/json"
      value_template: '{{ value_json["production"]["ph-a"]["pf"] | round(2) }}'
      unique_id: envoy_production_power_factor
      qos: 0
      unit_of_measurement: "%"
      state_class: measurement
      device_class: power_factor

    - name: envoy production frequency
      state_topic: "/envoy/json"
      value_template: '{{ value_json["production"]["ph-a"]["f"] | round(2) }}'
      unique_id: envoy_production_frequency
      qos: 0
      unit_of_measurement: "Hz"
      state_class: measurement
      device_class: frequency

    # ── Net Consumption (positive = importing, negative = exporting) ─
    - name: envoy net consumption
      state_topic: "/envoy/json"
      value_template: '{{ value_json["net-consumption"]["ph-a"]["p"] | round(0) | int(0) }}'
      unique_id: envoy_net_consumption
      qos: 0
      unit_of_measurement: "W"
      state_class: measurement
      device_class: power

    # ── Total Consumption ───────────────────────────────────────
    - name: envoy consumption
      state_topic: "/envoy/json"
      value_template: '{{ value_json["total-consumption"]["ph-a"]["p"] | round(0) | int(0) }}'
      unique_id: envoy_consumption
      qos: 0
      unit_of_measurement: "W"
      state_class: measurement
      device_class: power

    - name: envoy consumption voltage
      state_topic: "/envoy/json"
      value_template: '{{ value_json["total-consumption"]["ph-a"]["v"] | round(1) }}'
      unique_id: envoy_consumption_voltage
      qos: 0
      unit_of_measurement: "V"
      state_class: measurement
      device_class: voltage

    - name: envoy consumption current
      state_topic: "/envoy/json"
      value_template: '{{ value_json["total-consumption"]["ph-a"]["i"] | round(2) }}'
      unique_id: envoy_consumption_current
      qos: 0
      unit_of_measurement: "A"
      state_class: measurement
      device_class: current

    - name: envoy consumption power factor
      state_topic: "/envoy/json"
      value_template: '{{ value_json["total-consumption"]["ph-a"]["pf"] | round(2) }}'
      unique_id: envoy_consumption_power_factor
      qos: 0
      unit_of_measurement: "%"
      state_class: measurement
      device_class: power_factor
